<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cosmos Infographic — I 4 Tipi Energetici Human Design</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet">
  <style>
    /* === COSMOS DESIGN SYSTEM — OBSIDIAN MODE === */
    :root {
      --obsidian: #0E0E10;
      --pearl: #EDEAE4;
      --pearl-deep: #E0DDD7;
      --gold: #B8924A;
      --emerald: #009E74;
      --charcoal: #3A3530;
      --stone: #7A7670;
      --cosmos-blue: #4A6CF7;
      --cosmos-blue-end: #7B5EA7;
      --cosmos-violet: #9B6DFF;
      --cosmos-violet-end: #FF6FB5;
      --cosmos-amber: #C4A24D;
      --cosmos-amber-end: #1A1A1A;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: var(--obsidian);
      color: var(--pearl);
      font-family: 'Inter', sans-serif;
      font-weight: 300;
      -webkit-font-smoothing: antialiased;
    }

    .canvas {
      width: 1080px;
      height: 1350px;
      margin: 0 auto;
      position: relative;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 64px;
    }

    /* === TYPOGRAPHY === */
    .display { font-family: 'Playfair Display', serif; font-weight: 700; font-size: 48px; line-height: 1.1; letter-spacing: -0.02em; color: var(--pearl); text-align: center; }
    .h1 { font-family: 'Playfair Display', serif; font-weight: 600; font-size: 36px; line-height: 1.2; letter-spacing: -0.01em; color: var(--gold); text-align: center; }
    .h2 { font-family: 'Playfair Display', serif; font-weight: 500; font-size: 26px; line-height: 1.3; color: var(--pearl); text-align: center; }
    .label { font-family: 'Inter', sans-serif; font-weight: 600; font-size: 12px; line-height: 1.5; letter-spacing: 0.3em; text-transform: uppercase; }
    .caption { font-family: 'Inter', sans-serif; font-weight: 300; font-size: 13px; line-height: 1.5; color: rgba(237, 234, 228, 0.5); }

    /* === PRIMITIVES === */
    /* Orb */
    .orb {
      border-radius: 50%;
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      width: var(--orb-size, 160px);
      height: var(--orb-size, 160px);
      flex-shrink: 0;
    }
    .orb-core {
      width: 55%;
      height: 55%;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 2;
    }
    .orb-symbol {
      font-family: 'Inter', sans-serif;
      font-weight: 400;
      font-size: 28px;
      color: var(--pearl);
    }

    /* Orb color variants */
    .orb-gold {
      background: radial-gradient(circle at 50% 50%, rgba(184,146,74,0.7) 0%, rgba(184,146,74,0.3) 40%, rgba(184,146,74,0.05) 70%, transparent 100%);
      box-shadow: 0 0 60px rgba(184,146,74,0.3), 0 0 120px rgba(184,146,74,0.1);
    }
    .orb-red {
      background: radial-gradient(circle at 50% 50%, rgba(192,57,43,0.65) 0%, rgba(192,57,43,0.25) 40%, rgba(192,57,43,0.05) 70%, transparent 100%);
      box-shadow: 0 0 60px rgba(192,57,43,0.3), 0 0 120px rgba(192,57,43,0.1);
    }
    .orb-blue {
      background: radial-gradient(circle at 50% 50%, rgba(74,108,247,0.6) 0%, rgba(123,94,167,0.3) 40%, rgba(74,108,247,0.05) 70%, transparent 100%);
      box-shadow: 0 0 60px rgba(74,108,247,0.3), 0 0 120px rgba(74,108,247,0.1);
    }
    .orb-violet {
      background: radial-gradient(circle at 50% 50%, rgba(155,109,255,0.5) 0%, rgba(200,200,220,0.2) 40%, rgba(155,109,255,0.03) 70%, transparent 100%);
      box-shadow: 0 0 60px rgba(155,109,255,0.2), 0 0 120px rgba(200,200,220,0.08);
    }

    /* Totem layout */
    .totem {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0;
    }
    .totem-connector {
      width: 2px;
      height: 36px;
      background: linear-gradient(to bottom, rgba(184,146,74,0.35), rgba(184,146,74,0.05));
      margin: -12px 0;
      z-index: 1;
    }

    /* Totem item wrapper */
    .totem-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
      z-index: 2;
    }

    /* Type name label */
    .type-name {
      font-family: 'Playfair Display', serif;
      font-weight: 600;
      font-size: 20px;
      letter-spacing: 0.02em;
      text-align: center;
    }
    .type-name-gold { color: var(--gold); }
    .type-name-red { color: #E74C3C; }
    .type-name-blue { color: var(--cosmos-blue); }
    .type-name-violet { color: #C8B8E8; }

    /* Strategy subtitle */
    .type-strategy {
      font-family: 'Inter', sans-serif;
      font-weight: 300;
      font-size: 13px;
      letter-spacing: 0.08em;
      color: var(--stone);
      text-align: center;
    }

    /* Header section */
    .header-section {
      text-align: center;
      margin-bottom: 48px;
    }
    .header-section .label {
      color: var(--gold);
      margin-bottom: 12px;
      display: block;
    }
    .header-section .display {
      margin-bottom: 8px;
    }
    .header-section .caption {
      margin-top: 8px;
    }

    /* Decorative background ring */
    .bg-ring {
      position: absolute;
      border-radius: 50%;
      border: 1px solid rgba(184,146,74,0.06);
      pointer-events: none;
    }
    .bg-ring-1 { width: 900px; height: 900px; top: 50%; left: 50%; transform: translate(-50%, -50%); }
    .bg-ring-2 { width: 700px; height: 700px; top: 50%; left: 50%; transform: translate(-50%, -50%); border-color: rgba(155,109,255,0.04); }
    .bg-ring-3 { width: 500px; height: 500px; top: 50%; left: 50%; transform: translate(-50%, -50%); border-color: rgba(74,108,247,0.04); }

    /* Signature */
    .cosmos-signature {
      position: absolute;
      bottom: 32px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .signature-glyph { font-size: 14px; color: var(--gold); }
    .signature-text { font-family: 'Inter', sans-serif; font-weight: 600; font-size: 9px; letter-spacing: 0.3em; text-transform: uppercase; color: rgba(237,234,228,0.3); }
  </style>
</head>
<body>
  <div class="canvas">

    <!-- Background decorative rings -->
    <div class="bg-ring bg-ring-1"></div>
    <div class="bg-ring bg-ring-2"></div>
    <div class="bg-ring bg-ring-3"></div>

    <!-- Header -->
    <div class="header-section">
      <span class="label">Human Design</span>
      <h1 class="display">I 4 Tipi Energetici</h1>
      <p class="caption">Le quattro aure fondamentali nel sistema Human Design</p>
    </div>

    <!-- Totem: 4 HD Types -->
    <div class="totem">

      <!-- Manifestor -->
      <div class="totem-item">
        <div class="orb orb-gold" style="--orb-size: 140px;">
          <div class="orb-core">
            <span class="orb-symbol">⬡</span>
          </div>
        </div>
        <span class="type-name type-name-gold">Manifestor</span>
        <span class="type-strategy">Strategia: Informare</span>
      </div>

      <div class="totem-connector"></div>

      <!-- Generator -->
      <div class="totem-item">
        <div class="orb orb-red" style="--orb-size: 140px;">
          <div class="orb-core">
            <span class="orb-symbol">⬡</span>
          </div>
        </div>
        <span class="type-name type-name-red">Generator</span>
        <span class="type-strategy">Strategia: Rispondere</span>
      </div>

      <div class="totem-connector"></div>

      <!-- Projector -->
      <div class="totem-item">
        <div class="orb orb-blue" style="--orb-size: 140px;">
          <div class="orb-core">
            <span class="orb-symbol">⬡</span>
          </div>
        </div>
        <span class="type-name type-name-blue">Projector</span>
        <span class="type-strategy">Strategia: Aspettare l'invito</span>
      </div>

      <div class="totem-connector"></div>

      <!-- Reflector -->
      <div class="totem-item">
        <div class="orb orb-violet" style="--orb-size: 140px;">
          <div class="orb-core">
            <span class="orb-symbol">⬡</span>
          </div>
        </div>
        <span class="type-name type-name-violet">Reflector</span>
        <span class="type-strategy">Strategia: Attendere un ciclo lunare</span>
      </div>

    </div>

    <!-- Signature -->
    <div class="cosmos-signature">
      <span class="signature-glyph">✦</span>
      <span class="signature-text">GRIMORIA</span>
    </div>
  </div>
</body>
</html>
